<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin rezervací</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen p-6">

  <div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-10">
      <h1 class="text-4xl font-bold">Admin rezervací</h1>

      <button
        id="clearAll"
        class="bg-red-600 px-5 py-3 rounded-full font-semibold"
      >
        Vymazat vše
      </button>
    </div>

    <div id="bookingList" class="grid gap-6"></div>
  </div>

<script>
const bookingList = document.getElementById("bookingList");
let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

function renderBookings() {
  bookingList.innerHTML = "";

  if (bookings.length === 0) {
    bookingList.innerHTML = `
      <div class="bg-zinc-900 rounded-3xl p-8 text-center text-zinc-400">
        Zatím žádné rezervace.
      </div>
    `;
    return;
  }

  bookings.forEach((booking, index) => {
    bookingList.innerHTML += `
      <div class="bg-zinc-900 rounded-3xl p-6 border border-white/10">
        <div class="grid md:grid-cols-2 gap-3 text-lg">
          <p><b>Jméno:</b> ${booking.name}</p>
          <p><b>Telefon:</b> ${booking.phone}</p>
          <p><b>Služba:</b> ${booking.service}</p>
          <p><b>Specialista:</b> ${booking.specialist}</p>
          <p><b>Datum:</b> ${booking.date}</p>
          <p><b>Čas:</b> ${booking.time}</p>
        </div>

        <button
          onclick="deleteBooking(${index})"
          class="mt-5 bg-white text-black px-5 py-2 rounded-full font-semibold"
        >
          Smazat rezervaci
        </button>
      </div>
    `;
  });
}

function deleteBooking(index) {
  bookings.splice(index, 1);
  localStorage.setItem("bookings", JSON.stringify(bookings));
  renderBookings();
}

document.getElementById("clearAll").addEventListener("click", () => {
  bookings = [];
  localStorage.removeItem("bookings");
  renderBookings();
});

renderBookings();
</script>

</body>
</html>
